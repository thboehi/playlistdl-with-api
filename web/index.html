<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Downloader - Sale Pirate</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="container">

        <div class="container-title">
            <img src="swiper.webp" alt="Swiper" id="swiper">
            <h1>Chipeur</h1>
            <p>Arrête de choper</p>
            <p><span id="version">Loading version...</span></p>
        </div>
        
        <input type="text" id="spotifyLink" placeholder="Link to a song or a playlist">
        <button onclick="download()">Download <p>(totally legaly)</p></button>

        <!-- Progress bar -->
        <progress id="progress" value="0" max="100" style="display:none;"></progress>

        <div id="result"></div>

        <!-- Logs section -->
        <div id="logs" class="logs"></div>
    </div>
    <script>
        fetch('/version')
            .then(response => response.json())
            .then(data => {
                document.getElementById('version').innerText = data.version;
            })
            .catch(error => {
                console.error("Error loading the version:", error);
                document.getElementById('version').innerText = "unknown";
            });
    </script>
    <script src="script.js"></script>
    <script src="https://thbo.ch/credits.js"></script>
</body>
</html>
